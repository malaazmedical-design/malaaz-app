<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>اختبار Supabase</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body{font-family:Arial;padding:20px;background:#f5f5f5;}
  .box{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #ddd;}
  .ok{color:green;font-weight:bold;}
  .err{color:red;font-weight:bold;}
  pre{background:#f0f0f0;padding:12px;border-radius:8px;font-size:12px;overflow-x:auto;white-space:pre-wrap;}
  button{background:#2d3b3e;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:16px;cursor:pointer;width:100%;}
</style>
</head>
<body>
<h2>🔍 اختبار اتصال Supabase — ملاذ</h2>
<div class="box">
  <button onclick="runTest()">ابدأ الاختبار</button>
</div>
<div id="results"></div>

<script>
const SUPABASE_URL = "https://oobzgibvjrpkichtitgy.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vYnpnaWJ2anJwa2ljaHRpdGd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0OTY1NjEsImV4cCI6MjA5MzA3MjU2MX0.SiBYYbdLtIxPHPv5gn9dUhA1enMqfv9VKsGc2zGfkAQ";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function addResult(title, ok, details) {
  document.getElementById('results').innerHTML += `
    <div class="box">
      <div class="${ok?'ok':'err'}">${ok?'✅':'❌'} ${title}</div>
      <pre>${typeof details === 'object' ? JSON.stringify(details, null, 2) : details}</pre>
    </div>`;
}

async function runTest() {
  document.getElementById('results').innerHTML = '<div class="box">جاري الاختبار...</div>';

  const tables = ['services', 'providers', 'bookings', 'coverage_areas'];
  
  for (const table of tables) {
    try {
      const { data, error } = await sb.from(table).select('*').limit(3);
      if (error) {
        addResult(`جدول ${table}`, false, {
          message: error.message,
          code: error.code,
          details: error.details,
          hint: error.hint
        });
      } else {
        addResult(`جدول ${table} — ${data.length} سجل`, true, 
          data.length > 0 ? data[0] : 'الجدول فاضي');
      }
    } catch(e) {
      addResult(`جدول ${table} — خطأ في الاتصال`, false, e.message);
    }
  }
}
</script>
</body>
</html>
